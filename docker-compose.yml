# SlimCheck API - Docker Compose 配置
version: '3.8'

services:
  slimcheck-api:
    build: .
    container_name: slimcheck-api
    ports:
      - "8083:8083"
    environment:
      # ===== LLM 配置 =====
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-doubao-seed-2.0-pro}

      # ===== 服务配置 =====
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}

      # ===== 并发配置 =====
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-10}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-120}

      # ===== CORS 配置 =====
      - CORS_ORIGINS=${CORS_ORIGINS:-*}

    volumes:
      # 持久化用户数据和日志
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    networks:
      - slimcheck-network

networks:
  slimcheck-network:
    driver: bridge

volumes:
  slimcheck-data:
    driver: local
